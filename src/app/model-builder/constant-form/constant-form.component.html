<p-dialog 
  [(visible)]="visible" 
  [header]="isEditMode ? 'Edit Constant' : 'Add Constant'"
  [modal]="true"
  [style]="{width: '450px'}"
  (onHide)="onCancel()">
  
  <form (submit)="onSubmit($event)" class="flex flex-col gap-4">
    <!-- Name Field -->
    <div class="form-field">
      <label for="name" class="block mb-2 font-medium">Name</label>
      <input 
        pInputText 
        id="name" 
        [(ngModel)]="formData.name" 
        name="name"
        class="w-full"
        [class.ng-invalid]="nameError"
        required 
      />
      <small *ngIf="nameError" class="text-red-600 block mt-1">{{ nameError }}</small>
    </div>

    <!-- Value Field -->
    <div class="form-field">
      <label for="value" class="block mb-2 font-medium">Value</label>
      <input 
        pInputText 
        id="value" 
        type="number" 
        [(ngModel)]="formData.value" 
        name="value"
        class="w-full"
        [class.ng-invalid]="valueError"
        step="any"
        required 
      />
      <small *ngIf="valueError" class="text-red-600 block mt-1">{{ valueError }}</small>
    </div>

    <!-- Form Actions -->
    <div class="flex justify-end gap-2 mt-4">
      <p-button 
        type="button" 
        label="Cancel" 
        severity="secondary"
        (onClick)="onCancel()"
      ></p-button>
      <p-button 
        type="submit" 
        label="Save"
      ></p-button>
    </div>
  </form>
</p-dialog>
