<div class="constant-section mb-4">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-xl font-semibold">Constants</h3>
    <p-button 
      label="Add Constant" 
      icon="pi pi-plus" 
      (onClick)="openAddDialog()"
      size="small"
    ></p-button>
  </div>
  
  <div *ngIf="modelService.constants().length === 0" class="empty-state p-4 text-center bg-gray-50 rounded border border-gray-200">
    <p class="text-gray-600">No constants defined. Click "Add Constant" to create one.</p>
  </div>
  
  <div *ngIf="modelService.constants().length > 0" class="space-y-2">
    <div *ngFor="let constant of modelService.constants()" class="constant-item flex items-center justify-between p-3 bg-white border border-gray-200 rounded hover:bg-gray-50">
      <div class="constant-info flex-1">
        <div class="flex items-center gap-3">
          <span class="constant-name font-semibold text-lg">{{ constant.name }}</span>
          <span class="constant-value px-2 py-1 bg-green-100 text-green-800 text-sm rounded font-mono">
            = {{ constant.value }}
          </span>
        </div>
      </div>
      <div class="constant-actions flex gap-2 ml-4">
        <p-button 
          icon="pi pi-pencil" 
          (onClick)="openEditDialog(constant)"
          severity="info"
          size="small"
          [outlined]="true"
          [rounded]="true"
          pTooltip="Edit constant"
          tooltipPosition="top"
        ></p-button>
        <p-button 
          icon="pi pi-times" 
          (onClick)="deleteConstant(constant)"
          severity="danger"
          size="small"
          [outlined]="true"
          [rounded]="true"
          pTooltip="Delete constant"
          tooltipPosition="top"
        ></p-button>
      </div>
    </div>
  </div>
</div>

<!-- Constant Form Dialog -->
<app-constant-form
  [(visible)]="showDialog"
  [constant]="editingConstant"
  (save)="onConstantSave($event)"
></app-constant-form>
