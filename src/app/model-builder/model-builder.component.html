<div class="model-builder-container p-6">
  <p-card>
    <ng-template pTemplate="header">
      <div class="p-6 pb-0">
        <h2 class="text-3xl font-bold text-gray-800">Monte Carlo Model Builder</h2>
        <p class="text-gray-600 mt-2">Define variables, constants, and mathematical expressions for your simulation model</p>
      </div>
    </ng-template>

    <div class="space-y-6">
      <!-- Variables and Constants in Two Columns -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Variables Section -->
        <div class="section">
          <app-variable-list></app-variable-list>
        </div>

        <!-- Constants Section -->
        <div class="section">
          <app-constant-list></app-constant-list>
        </div>
      </div>

      <!-- Divider -->
      <div class="border-t border-gray-200"></div>

      <!-- Expression Section (Full Width) -->
      <div class="section">
        <app-expression-input></app-expression-input>
      </div>
    </div>
  </p-card>
</div>
